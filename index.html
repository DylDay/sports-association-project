<!doctype html>
<html lang="en">

<head>
  <base href="/">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="Description" content="Demonstration for sports-association-project">

  <style>
    :root, html, body {
      margin: var(--ddd-spacing-0);
      padding: var(--ddd-spacing-0);
    }
    #demo {
      margin: var(--ddd-spacing-2);
    }
    sports-association-project {
      margin: var(--ddd-spacing-2);
      border: var(--ddd-border-md);
      border-radius: var(--ddd-radius-lg);
    }
    sports-association-project:hover {
      box-shadow: var(--ddd-boxShadow-sm);
    }
    #example {
      --sports-association-project-font-size: var(--ddd-font-size-l);
      background-color: var(--ddd-accent-2);
      color: var(--ddd-primary-17);
    }
  </style>
  <title>sports-association-project</title>
</head>

<body>
  <div id="demo">
    <h1>sports-association-project</h1>
    <!-- this is going to do whatever the tag's defaults are -->
    <h2>Default</h2>
    <sports-association-project></sports-association-project>
    <h2>Slot usage</h2>
    <sports-association-project data-accent="2" data-primary="17"><div>Sample slot content</div></sports-association-project>
    <h2>Property usage</h2>
    <sports-association-project id="example" title="Sample property title"></sports-association-project>
  </div>
  <script type="module" src="./sports-association-project.js"></script>
</body>
</html>
